        <rect x="140" y="0" width="84" height="28" rx="14" fill="#052e16" stroke="#047857"/>
        <text x="26" y="19" text-anchor="middle" fill="#67e8f9" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="14">web</text>
        <text x="96" y="19" text-anchor="middle" fill="#c4b5fd" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="14">infra</text>
        <text x="182" y="19" text-anchor="middle" fill="#86efac" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="14">agents</text>
