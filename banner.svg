    <path d="M0 291C151 237 258 250 401 287C540 323 676 309 807 246C928 188 1056 166 1200 185" stroke="#64748b" stroke-width="1"/>
    <path d="M0 111C167 152 315 143 439 93C576 38 701 51 829 109C952 166 1054 174 1200 132" stroke="#475569" stroke-width="1"/>
