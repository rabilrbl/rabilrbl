      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="shadow" x="80" y="20" width="1040" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="40" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#cyan)"/>
  <rect width="1200" height="360" rx="34" fill="url(#violet)"/>
  <rect width="1200" height="360" rx="34" fill="url(#emerald)"/>

  <g opacity="0.25">
