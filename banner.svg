    <text x="136" y="214" fill="#bae6fd" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="25" font-weight="650">Software Developer · Automation · Web · AI tooling</text>
    <text x="136" y="258" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="500">Building sharp, useful systems from Sullia, India.</text>

